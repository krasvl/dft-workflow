name: dft-workflow
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pip:
      # FastAPI services + Celery workers (mirrors per-service requirements
      # used by the Docker images).
      - celery[redis]>=5.4.0
      - redis>=5.0.0
      - pydantic>=2.7.0
      - pydantic-settings>=2.6.0
      - boto3>=1.35.0
      - fastapi>=0.115.0
      - uvicorn[standard]>=0.32.0
      - python-multipart>=0.0.12

      # Numerics + DFT engine.
      - numpy>=2.1.0
      - scipy>=1.11.0
      - pyscf>=2.6.0

      # ML stack (MACE-based density predictor and graph2mat data plumbing).
      - torch>=2.5.0
      - torch-geometric>=2.5.0
      - e3nn>=0.4.4,<0.5.0
      - mace-torch>=0.3.0
      - graph2mat[e3nn,tools]>=0.0.13

      # Tests.
      - pytest>=8.3.0
      - httpx>=0.27.0
