upstream data_service {
    server data-service:8000;
}

upstream density_service {
    server density-service:8000;
}

server {
    listen 80;
    server_name localhost;

    client_max_body_size 50m;

    # Data service: molecule upload, manifests, DFT job status
    location /api/data/ {
        proxy_pass http://data_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
    }

    # Density service: density-matrix inference and model registry
    location /api/density/ {
        proxy_pass http://density_service;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_read_timeout 300s;
    }

    location / {
        return 200 '{"gateway":"ok","routes":["/api/data/*","/api/density/*"]}';
        add_header Content-Type application/json;
    }
}
