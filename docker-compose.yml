# Local stack: data + density services, dft + training workers, MinIO, Redis,
# and an Nginx gateway. Override any value via a sibling .env file (see
# .env.example). The default MinIO credentials below are local development
# placeholders — replace them before exposing the stack outside localhost.
services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - dft-net

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minio123}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dft-net

  data-service:
    build:
      context: .
      dockerfile: services/data_service/Dockerfile
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio123}
      MINIO_SECURE: "false"
      MINIO_BUCKET: ${MINIO_BUCKET:-dft-workflow}
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - dft-net

  density-service:
    build:
      context: .
      dockerfile: services/density_service/Dockerfile
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio123}
      MINIO_SECURE: "false"
      MINIO_BUCKET: ${MINIO_BUCKET:-dft-workflow}
      MODEL_CACHE_TTL_SEC: ${MODEL_CACHE_TTL_SEC:-300}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - dft-net

  dft-worker:
    build:
      context: .
      dockerfile: workers/dft_worker/Dockerfile
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio123}
      MINIO_SECURE: "false"
      MINIO_BUCKET: ${MINIO_BUCKET:-dft-workflow}
      REDIS_URL: redis://redis:6379/0
      TRAINING_BATCH_MIN_SAMPLES: ${TRAINING_BATCH_MIN_SAMPLES:-1000}
      TRAINING_BATCH_COUNTER_KEY: dft:completed_since_last_train
      DFT_ENGINE: ${DFT_ENGINE:-pyscf}
      DFT_DEFAULT_METHOD: ${DFT_DEFAULT_METHOD:-rks}
      DFT_DEFAULT_BASIS: ${DFT_DEFAULT_BASIS:-sto-3g}
      DFT_MAX_SCF_CYCLES: ${DFT_MAX_SCF_CYCLES:-100}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - dft-net

  training-worker:
    build:
      context: .
      dockerfile: workers/training_worker/Dockerfile
    environment:
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minio123}
      MINIO_SECURE: "false"
      MINIO_BUCKET: ${MINIO_BUCKET:-dft-workflow}
      REDIS_URL: redis://redis:6379/0
      TRAINING_ENGINE: ${TRAINING_ENGINE:-mace}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - dft-net

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      data-service:
        condition: service_healthy
        restart: true
      density-service:
        condition: service_healthy
        restart: true
    networks:
      - dft-net

volumes:
  minio_data:

networks:
  dft-net:
    driver: bridge
